repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix .
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        stages: [pre-push]
      
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
      
      - id: coverage
        name: coverage threshold
        entry: uv run pytest --cov=src --cov-fail-under=90
        language: system
        pass_filenames: false
        stages: [pre-push]